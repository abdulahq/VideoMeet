<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - VideoMeet</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    :root { --primary: #6366F1; }
    body { background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .hero-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%); }
    .signup-container { position: relative; width: 100%; max-width: 440px; padding: 2.5rem; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; justify-content: center; }
    .brand svg { width: 40px; height: 40px; }
    .brand-name { font-family: 'Outfit', sans-serif; font-size: 1.75rem; font-weight: 700; color: #F8FAFC; }
    .brand-name span { color: #6366F1; }
    .signup-header { text-align: center; margin-bottom: 2rem; }
    .signup-header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #F8FAFC; }
    .signup-header p { color: #94A3B8; font-size: 0.9375rem; }
    .form-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(71, 85, 105, 0.4); color: #F8FAFC; }
    .form-input:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
    .btn-primary { width: 100%; padding: 0.9375rem; font-size: 1rem; font-weight: 600; background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); border-radius: 12px; color: white; border: none; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-google { width: 100%; padding: 0.9375rem; font-size: 1rem; font-weight: 500; background: white; color: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1rem; }
    .btn-google:hover { background: #f5f5f5; }
    .btn-google svg { width: 20px; height: 20px; }
    .login-link { text-align: center; color: #94A3B8; font-size: 0.9375rem; margin-top: 1.5rem; }
    .login-link a { color: #818CF8; font-weight: 500; }
    .form-error { color: #EF4444; font-size: 0.8125rem; margin-top: 0.5rem; display: none; text-align: center; }
    .form-group.has-error .form-error { display: block; }
    .divider-text { margin: 1rem 0; text-align: center; color: #64748B; font-size: 0.875rem; position: relative; }
    .divider-text::before, .divider-text::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #334155; }
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }
    .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .terms-text { font-size: 0.75rem; color: #64748B; text-align: center; margin-top: 1rem; }
    .terms-text a { color: #818CF8; }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  
  <div class="signup-container animate-scale-in">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#6366F1"/>
        <path d="M12 13C12 11.8954 12.8954 11 14 11H26C27.1046 11 28 11.8954 28 13V27C28 28.1046 27.1046 29 26 29H14C12.8954 29 12 28.1046 12 27V13Z" fill="white"/>
        <circle cx="20" cy="20" r="4" fill="#6366F1"/>
        <path d="M8 16V19C8 21.2091 9.79086 23 12 23H28C30.2091 23 32 21.2091 32 19V16" stroke="white" stroke-width="2"/>
      </svg>
      <span class="brand-name">Video<span>Meet</span></span>
    </div>

    <div class="signup-header">
      <h1>Create an account</h1>
      <p>Start hosting meetings in seconds</p>
    </div>

    <button class="btn-google" id="googleSignUpBtn">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider-text">or</div>

    <form id="signupForm">
      <div class="form-group">
        <label class="form-label" for="signupName">Full Name</label>
        <input type="text" class="form-input" id="signupName" placeholder="John Doe" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="signupEmail">Email</label>
        <input type="email" class="form-input" id="signupEmail" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="signupPassword">Password</label>
        <input type="password" class="form-input" id="signupPassword" placeholder="At least 6 characters" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
        <input type="password" class="form-input" id="signupConfirmPassword" placeholder="Repeat your password" required>
      </div>

      <div class="form-group has-error">
        <div class="form-error" id="signupError"></div>
      </div>

      <button type="submit" class="btn btn-primary" id="signupBtn">
        <span id="signupBtnText">Create Account</span>
      </button>
    </form>

    <p class="terms-text">By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>

    <p class="login-link">Already have an account? <a href="index.html">Sign in</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfnVDneU1fswdGuyuQrYL2Cu14SbdyphU",
      authDomain: "zoom-1523.firebaseapp.com",
      projectId: "zoom-1523",
      storageBucket: "zoom-1523.firebasestorage.app",
      messagingSenderId: "169784417830",
      appId: "1:169784417830:web:49112b9bc07519e956d0e7",
      measurementId: "G-80L03P8KY5"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    window.VideoMeetAuth = {
      signUp: async function(name, email, password) {
        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(userCredential.user, { displayName: name });
          return { success: true, user: userCredential.user };
        } catch (error) {
          return { success: false, error: error.message };
        }
      },

      signInWithGoogle: async function() {
        try {
          const result = await signInWithPopup(auth, googleProvider);
          return { success: true, user: result.user };
        } catch (error) {
          return { success: false, error: error.message };
        }
      }
    };

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;
      const signupBtn = document.getElementById('signupBtn');
      const signupBtnText = document.getElementById('signupBtnText');
      const errorEl = document.getElementById('signupError');

      if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.parentElement.classList.add('has-error');
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters';
        errorEl.parentElement.classList.add('has-error');
        return;
      }

      signupBtn.disabled = true;
      signupBtnText.innerHTML = '<span class="loading-spinner"></span>Creating account...';
      errorEl.textContent = '';
      errorEl.parentElement.classList.remove('has-error');

      const result = await VideoMeetAuth.signUp(name, email, password);
      
      if (result.success) {
        sessionStorage.setItem('videomeet_user', JSON.stringify({
          uid: result.user.uid,
          name: result.user.displayName || name,
          email: result.user.email,
          photoURL: result.user.photoURL
        }));
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = result.error;
        errorEl.parentElement.classList.add('has-error');
        signupBtn.disabled = false;
        signupBtnText.textContent = 'Create Account';
      }
    });

    document.getElementById('googleSignUpBtn').addEventListener('click', async function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner" style="border-color:rgba(0,0,0,0.3);border-top-color:#333;"></span>Signing up...';

      const result = await VideoMeetAuth.signInWithGoogle();
      
      if (result.success) {
        sessionStorage.setItem('videomeet_user', JSON.stringify({
          uid: result.user.uid,
          name: result.user.displayName || result.user.email.split('@')[0],
          email: result.user.email,
          photoURL: result.user.photoURL
        }));
        window.location.href = 'dashboard.html';
      } else {
        alert('Google sign-up failed: ' + result.error);
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google';
      }
    });

    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
