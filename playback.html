<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playback - VideoMeet</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    :root { --primary: #6366F1; }
    body { background: #0F172A; min-height: 100vh; }
    .playback-container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .playback-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: #1E293B; border-radius: 10px; color: #94A3B8; border: none; cursor: pointer; transition: all 0.2s; }
    .back-btn:hover { background: #334155; color: #F8FAFC; }
    .back-btn svg { width: 20px; height: 20px; }
    .playback-header h1 { font-size: 1.5rem; font-weight: 600; color: #F8FAFC; }
    .video-player { background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 16 / 9; margin-bottom: 1.5rem; position: relative; }
    .video-player video { width: 100%; height: 100%; display: block; }
    .player-controls { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; background: #1E293B; border-radius: 12px; flex-wrap: wrap; }
    .play-btn { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #6366F1; border-radius: 50%; color: white; border: none; cursor: pointer; transition: all 0.2s; }
    .play-btn:hover { background: #4F46E5; }
    .play-btn svg { width: 20px; height: 20px; }
    .progress-bar { flex: 1; min-width: 100px; height: 6px; background: #334155; border-radius: 3px; cursor: pointer; position: relative; }
    .progress-bar-fill { height: 100%; background: #6366F1; border-radius: 3px; width: 0; transition: width 0.1s linear; }
    .time-display { font-size: 0.875rem; color: #94A3B8; font-variant-numeric: tabular-nums; min-width: 100px; }
    .volume-control { display: flex; align-items: center; gap: 0.5rem; }
    .volume-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: transparent; color: #94A3B8; border: none; border-radius: 8px; cursor: pointer; }
    .volume-btn:hover { background: #334155; color: #F8FAFC; }
    .volume-btn svg { width: 18px; height: 18px; }
    .volume-slider { width: 80px; height: 4px; -webkit-appearance: none; background: #334155; border-radius: 2px; cursor: pointer; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #6366F1; border-radius: 50%; cursor: pointer; }
    .playback-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .info-card { background: #1E293B; padding: 1.25rem; border-radius: 12px; }
    .info-label { font-size: 0.8125rem; color: #64748B; margin-bottom: 0.25rem; }
    .info-value { font-size: 1rem; font-weight: 500; color: #F8FAFC; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; background: #6366F1; color: white; border-radius: 10px; font-weight: 500; margin-top: 1.5rem; text-decoration: none; transition: all 0.2s; border: none; cursor: pointer; }
    .btn:hover { background: #4F46E5; transform: translateY(-2px); }
    .btn svg { width: 18px; height: 18px; }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; text-align: center; }
    .loading-state svg { width: 48px; height: 48px; color: #6366F1; margin-bottom: 1rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) {
      .playback-container { padding: 1rem; }
      .player-controls { gap: 0.75rem; padding: 0.75rem; }
      .progress-bar { min-width: 60px; }
      .time-display { font-size: 0.75rem; min-width: 80px; }
      .volume-control { display: none; }
    }
  </style>
</head>
<body>
  <div class="playback-container">
    <div class="playback-header">
      <a href="dashboard.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <h1 id="recordingTitle">Loading...</h1>
    </div>

    <div class="video-player">
      <video id="videoPlayer" controls></video>
    </div>

    <div class="player-controls">
      <button class="play-btn" id="playBtn">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <div class="progress-bar" id="progressBar">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="time-display">
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
      </div>
      <div class="volume-control">
        <button class="volume-btn" id="muteBtn">
          <svg id="volumeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
          <svg id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
      </div>
    </div>

    <div class="playback-info">
      <div class="info-card">
        <div class="info-label">Date</div>
        <div class="info-value" id="recordingDate">-</div>
      </div>
      <div class="info-card">
        <div class="info-label">Duration</div>
        <div class="info-value" id="recordingDuration">-</div>
      </div>
      <div class="info-card">
        <div class="info-label">File Size</div>
        <div class="info-value" id="recordingSize">-</div>
      </div>
      <div class="info-card">
        <div class="info-label">Meeting ID</div>
        <div class="info-value" id="meetingId">-</div>
      </div>
    </div>

    <a href="#" class="btn" id="downloadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Recording
    </a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
    import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfnVDneU1fswdGuyuQrYL2Cu14SbdyphU",
      authDomain: "zoom-1523.firebaseapp.com",
      projectId: "zoom-1523",
      storageBucket: "zoom-1523.firebasestorage.app",
      messagingSenderId: "169784417830",
      appId: "1:169784417830:web:49112b9bc07519e956d0e7",
      measurementId: "G-80L03P8KY5"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let recording = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      await loadRecording();
    });

    async function loadRecording() {
      const urlParams = new URLSearchParams(window.location.search);
      const recordingId = urlParams.get('id');

      if (!recordingId) {
        showError('Recording not found');
        return;
      }

      try {
        const docRef = doc(db, 'users', currentUser.uid, 'recordings', recordingId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          recording = { id: docSnap.id, ...docSnap.data() };
          renderRecording();
        } else {
          showError('Recording not found');
        }
      } catch (err) {
        console.error('Load recording error:', err);
        showError('Failed to load recording');
      }
    }

    function renderRecording() {
      document.getElementById('recordingTitle').textContent = recording.name || 'Recording';
      document.getElementById('recordingDate').textContent = recording.date ? new Date(recording.date).toLocaleDateString() : '-';
      document.getElementById('recordingSize').textContent = recording.size || '-';
      document.getElementById('meetingId').textContent = recording.meetingId || '-';
      document.getElementById('duration').textContent = recording.duration ? formatDuration(recording.duration) : '0:00';
      
      if (recording.url) {
        document.getElementById('videoPlayer').src = recording.url;
        document.getElementById('downloadBtn').href = recording.url;
        document.getElementById('downloadBtn').download = (recording.name || 'recording') + '.webm';
      }

      setupVideoControls();
    }

    function setupVideoControls() {
      const video = document.getElementById('videoPlayer');
      const playBtn = document.getElementById('playBtn');
      const playIcon = document.getElementById('playIcon');
      const pauseIcon = document.getElementById('pauseIcon');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl = document.getElementById('duration');
      const volumeSlider = document.getElementById('volumeSlider');
      const muteBtn = document.getElementById('muteBtn');
      const volumeIcon = document.getElementById('volumeIcon');
      const muteIcon = document.getElementById('muteIcon');

      playBtn.addEventListener('click', () => {
        if (video.paused) {
          video.play();
        } else {
          video.pause();
        }
      });

      video.addEventListener('play', () => {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      });

      video.addEventListener('pause', () => {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      });

      video.addEventListener('timeupdate', () => {
        const progress = (video.currentTime / video.duration) * 100;
        progressFill.style.width = progress + '%';
        currentTimeEl.textContent = formatDuration(Math.floor(video.currentTime));
      });

      video.addEventListener('loadedmetadata', () => {
        durationEl.textContent = formatDuration(Math.floor(video.duration));
      });

      progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
      });

      volumeSlider.addEventListener('input', (e) => {
        video.volume = e.target.value / 100;
        updateVolumeIcon();
      });

      muteBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        updateVolumeIcon();
      });

      function updateVolumeIcon() {
        if (video.muted || video.volume === 0) {
          volumeIcon.style.display = 'none';
          muteIcon.style.display = 'block';
        } else {
          volumeIcon.style.display = 'block';
          muteIcon.style.display = 'none';
        }
      }
    }

    function formatDuration(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function showError(message) {
      document.querySelector('.playback-container').innerHTML = `
        <div class="playback-header">
          <a href="dashboard.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          </a>
          <h1>Error</h1>
        </div>
        <div class="loading-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <p style="color:#94A3B8;">${message}</p>
          <a href="dashboard.html" class="btn" style="margin-top:1rem;">Go to Dashboard</a>
        </div>
      `;
    }
  </script>
</body>
</html>
