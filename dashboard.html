<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - VideoMeet</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    :root { --primary: #6366F1; }
    body { background: #0F172A; }
    .dashboard-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1E293B; border-right: 1px solid #334155; padding: 1.5rem; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-brand { display: flex; align-items: center; gap: 0.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #334155; margin-bottom: 1.5rem; }
    .sidebar-brand svg { width: 32px; height: 32px; }
    .sidebar-brand span { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; color: #F8FAFC; }
    .sidebar-brand span span { color: #6366F1; }
    .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; color: #94A3B8; border-radius: 8px; margin-bottom: 0.25rem; font-weight: 500; transition: all 0.2s; text-decoration: none; }
    .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: #818CF8; }
    .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar-user { margin-top: auto; padding-top: 1.5rem; border-top: 1px solid #334155; display: flex; align-items: center; gap: 0.75rem; }
    .sidebar-user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #6366F1; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1rem; overflow: hidden; }
    .sidebar-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name { font-weight: 500; color: #F8FAFC; font-size: 0.9375rem; }
    .sidebar-user-email { font-size: 0.75rem; color: #64748B; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
    .dashboard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .dashboard-title { font-size: 1.75rem; font-weight: 600; }
    .welcome-text { color: #94A3B8; margin-top: 0.25rem; }
    .quick-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; font-weight: 500; border-radius: 10px; font-size: 0.9375rem; cursor: pointer; transition: all 0.2s; border: none; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
    .btn-secondary { background: #334155; color: #F8FAFC; }
    .btn-secondary:hover { background: #475569; }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: #EF4444; }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.8125rem; border-radius: 6px; }
    .btn-icon-sm { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; background: transparent; color: #64748B; border-radius: 6px; border: none; cursor: pointer; }
    .btn-icon-sm:hover { background: #334155; color: #F8FAFC; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: #1E293B; border: 1px solid #334155; border-radius: 16px; padding: 1.5rem; }
    .stat-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .stat-card-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: rgba(99, 102, 241, 0.1); border-radius: 12px; color: #6366F1; }
    .stat-card-value { font-size: 2rem; font-weight: 700; color: #F8FAFC; }
    .stat-card-label { color: #64748B; font-size: 0.875rem; margin-top: 0.25rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .section-title { font-size: 1.125rem; font-weight: 600; }
    .meetings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .meeting-card { background: #1E293B; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; transition: all 0.2s; }
    .meeting-card:hover { border-color: #6366F1; transform: translateY(-2px); }
    .meeting-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.75rem; gap: 0.5rem; }
    .meeting-title { font-weight: 600; color: #F8FAFC; margin-bottom: 0.25rem; }
    .meeting-time { font-size: 0.8125rem; color: #64748B; }
    .badge { padding: 0.25rem 0.5rem; font-size: 0.6875rem; border-radius: 6px; font-weight: 500; text-transform: uppercase; }
    .badge-success { background: rgba(16, 185, 129, 0.15); color: #10B981; }
    .badge-gray { background: rgba(148, 163, 184, 0.15); color: #94A3B8; }
    .badge-primary { background: rgba(99, 102, 241, 0.15); color: #818CF8; }
    .meeting-card-id { display: flex; align-items: center; gap: 0.5rem; margin: 0.75rem 0; padding: 0.5rem; background: #0F172A; border-radius: 6px; font-size: 0.8125rem; }
    .meeting-card-id code { color: #818CF8; font-family: monospace; }
    .copy-btn { background: transparent; border: none; color: #64748B; cursor: pointer; padding: 4px; border-radius: 4px; }
    .copy-btn:hover { background: #334155; color: #F8FAFC; }
    .meeting-card-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .recording-card { background: #1E293B; border: 1px solid #334155; border-radius: 12px; padding: 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .recording-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.1); border-radius: 10px; color: #EF4444; flex-shrink: 0; }
    .recording-info { flex: 1; min-width: 150px; }
    .recording-title { font-weight: 500; color: #F8FAFC; margin-bottom: 0.25rem; }
    .recording-meta { font-size: 0.8125rem; color: #64748B; }
    .empty-state { text-align: center; padding: 2rem; color: #64748B; }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.2s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal { background: #1E293B; border: 1px solid #334155; border-radius: 16px; width: 90%; max-width: 440px; overflow: hidden; transform: scale(0.95); transition: transform 0.2s; }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid #334155; }
    .modal-title { font-size: 1.125rem; font-weight: 600; }
    .modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: transparent; color: #64748B; border: none; border-radius: 6px; cursor: pointer; }
    .modal-close:hover { background: #334155; color: #F8FAFC; }
    .modal-body { padding: 1.5rem; }
    .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid #334155; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #94A3B8; }
    .form-input { width: 100%; padding: 0.875rem 1rem; font-size: 1rem; color: #F8FAFC; background: #0F172A; border: 1px solid #334155; border-radius: 8px; transition: all 0.2s; box-sizing: border-box; }
    .form-input:focus { border-color: #6366F1; outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
    .form-input::placeholder { color: #64748B; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
    .toast { display: flex; align-items: center; gap: 0.75rem; min-width: 280px; padding: 1rem; background: #1E293B; border: 1px solid #334155; border-radius: 8px; margin-bottom: 0.75rem; animation: slideUp 0.3s ease-out; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .toast.success { border-color: #10B981; }
    .toast.error { border-color: #EF4444; }
    .toast-message { flex: 1; font-size: 0.875rem; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .dashboard-header { flex-direction: column; align-items: flex-start; }
      .quick-actions { width: 100%; }
      .quick-actions .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy, serverTimestamp, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfnVDneU1fswdGuyuQrYL2Cu14SbdyphU",
      authDomain: "zoom-1523.firebaseapp.com",
      projectId: "zoom-1523",
      storageBucket: "zoom-1523.firebasestorage.app",
      messagingSenderId: "169784417830",
      appId: "1:169784417830:web:49112b9bc07519e956d0e7",
      measurementId: "G-80L03P8KY5"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.VideoMeetFirebase = { auth, db, storage };

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      renderUserInfo(user);
      await loadMeetings();
      await loadRecordings();
    });

    function renderUserInfo(user) {
      const nameEl = document.getElementById('userName');
      const emailEl = document.getElementById('userEmail');
      const initialEl = document.getElementById('userInitial');
      const photoEl = document.getElementById('userPhoto');
      const welcomeNameEl = document.getElementById('welcomeName');

      nameEl.textContent = user.displayName || user.email.split('@')[0];
      emailEl.textContent = user.email;
      welcomeNameEl.textContent = user.displayName || user.email.split('@')[0];
      
      if (user.photoURL) {
        photoEl.src = user.photoURL;
        photoEl.style.display = 'block';
        initialEl.style.display = 'none';
      } else {
        initialEl.textContent = (user.displayName || user.email).charAt(0).toUpperCase();
      }
    }

    async function loadMeetings() {
      try {
        const meetingsRef = collection(db, 'users', currentUser.uid, 'meetings');
        const q = query(meetingsRef, orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        
        let upcoming = [];
        let history = [];
        const now = new Date();

        snapshot.forEach(doc => {
          const meeting = { id: doc.id, ...doc.data() };
          const scheduledDate = meeting.scheduledTime ? new Date(meeting.scheduledTime) : null;
          
          if (meeting.status === 'completed' || (scheduledDate && scheduledDate < now)) {
            history.push(meeting);
          } else {
            upcoming.push(meeting);
          }
        });

        renderMeetings(upcoming, history);
        updateStats(upcoming.length, history.length);
      } catch (error) {
        console.error('Error loading meetings:', error);
        renderEmptyState();
      }
    }

    function renderMeetings(upcoming, history) {
      const upcomingContainer = document.getElementById('upcomingMeetings');
      const historyContainer = document.getElementById('historyMeetings');

      upcomingContainer.innerHTML = upcoming.length === 0 
        ? '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg><p>No upcoming meetings</p></div>'
        : upcoming.map(m => createMeetingCard(m, false)).join('');

      historyContainer.innerHTML = history.length === 0
        ? '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>No meeting history</p></div>'
        : history.map(m => createMeetingCard(m, true)).join('');
    }

    function createMeetingCard(meeting, isHistory) {
      const meetingId = meeting.id || meeting.meetingId || '';
      const displayId = meetingId.substring(0, 12);
      const title = meeting.title || 'Meeting';
      const scheduledDate = meeting.scheduledTime ? new Date(meeting.scheduledTime).toLocaleString() : 'Ongoing';

      return `
        <div class="meeting-card">
          <div class="meeting-card-header">
            <div>
              <h4 class="meeting-title">${escapeHtml(title)}</h4>
              <p class="meeting-time">${scheduledDate}</p>
            </div>
            <span class="badge ${isHistory ? 'badge-gray' : 'badge-success'}">${isHistory ? 'Completed' : 'Scheduled'}</span>
          </div>
          <div class="meeting-card-id">
            <span style="color: #64748B;">ID:</span>
            <code>${escapeHtml(displayId)}</code>
            <button class="copy-btn" onclick="copyToClipboard('${meetingId}')" title="Copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <div class="meeting-card-actions">
            <a href="meeting.html?id=${meetingId}" class="btn btn-primary btn-sm">Join</a>
            <button class="btn btn-secondary btn-sm" onclick="copyToClipboard(window.location.origin + '/meeting.html?id=${meetingId}')">Copy Link</button>
            ${!isHistory ? `<button class="btn btn-danger btn-sm" onclick="deleteMeeting('${meetingId}')">Delete</button>` : ''}
          </div>
        </div>
      `;
    }

    function updateStats(upcoming, completed) {
      document.getElementById('upcomingCount').textContent = upcoming;
      document.getElementById('completedCount').textContent = completed;
    }

    function renderEmptyState() {
      document.getElementById('upcomingMeetings').innerHTML = '<div class="empty-state"><p>Unable to load meetings</p></div>';
      document.getElementById('historyMeetings').innerHTML = '<div class="empty-state"><p>Unable to load history</p></div>';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.copyToClipboard = function(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard!', 'success');
      }).catch(() => {
        showToast('Failed to copy', 'error');
      });
    };

    window.deleteMeeting = async function(meetingId) {
      if (!confirm('Are you sure you want to delete this meeting?')) return;
      
      try {
        await deleteDoc(doc(db, 'users', currentUser.uid, 'meetings', meetingId));
        showToast('Meeting deleted', 'success');
        await loadMeetings();
      } catch (error) {
        console.error('Error deleting meeting:', error);
        showToast('Failed to delete meeting', 'error');
      }
    };

    window.createNewMeeting = async function() {
      const meetingId = generateMeetingId();
      console.log('Creating meeting:', meetingId);
      
      // Always redirect to meeting page
      window.location.href = `meeting.html?id=${meetingId}`;
    };

    function generateMeetingId() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
      let result = '';
      for (let i = 0; i < 3; i++) {
        if (i > 0) result += '-';
        for (let j = 0; j < 3; j++) {
          result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
      }
      return result;
    }

    async function loadRecordings() {
      try {
        const recordingsRef = collection(db, 'users', currentUser.uid, 'recordings');
        const q = query(recordingsRef, orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        
        let recordings = [];
        snapshot.forEach(doc => {
          recordings.push({ id: doc.id, ...doc.data() });
        });

        renderRecordings(recordings);
        document.getElementById('recordingsCount').textContent = recordings.length;
      } catch (error) {
        console.error('Error loading recordings:', error);
        document.getElementById('recordingsList').innerHTML = '<div class="empty-state"><p>Unable to load recordings</p></div>';
      }
    }

    function renderRecordings(recordings) {
      const container = document.getElementById('recordingsList');
      
      if (recordings.length === 0) {
        container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><p>No recordings yet</p></div>';
        return;
      }

      container.innerHTML = recordings.map(r => `
        <div class="recording-card">
          <div class="recording-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <div class="recording-info">
            <div class="recording-title">${escapeHtml(r.name || 'Recording')}</div>
            <div class="recording-meta">${r.size || 'Unknown size'} • ${r.date ? new Date(r.date).toLocaleDateString() : 'Unknown date'}</div>
          </div>
          <a href="${r.url || '#'}" ${r.url ? 'download' : 'target="_blank"'} class="btn btn-secondary btn-sm">Download</a>
        </div>
      `).join('');
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span class="toast-message">${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('joinSubmitBtn').addEventListener('click', () => {
      const input = document.getElementById('joinMeetingInput').value.trim();
      if (!input) {
        showToast('Please enter a meeting ID', 'error');
        return;
      }

      let meetingId = input;
      if (input.includes('meeting.html?id=')) {
        const url = new URL(input);
        meetingId = url.searchParams.get('id');
      }

      document.getElementById('joinMeetingModal').classList.remove('active');
      window.location.href = `meeting.html?id=${meetingId}`;
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = 'index.html';
      }).catch((error) => {
        console.error('Logout error:', error);
      });
    });

    window.Dashboard = {
      showMeetingsTab: function() {
        document.getElementById('upcomingSection').scrollIntoView({ behavior: 'smooth' });
      },
      showRecordingsTab: function() {
        document.getElementById('recordingsSection').scrollIntoView({ behavior: 'smooth' });
      }
    };
  </script>
</body>
</html>
